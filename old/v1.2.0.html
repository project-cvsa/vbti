  <script>
    // ========== 背景音乐 ==========
    (function(){ var bgm = document.createElement('audio'); bgm.src = 'bgm/bgm.mp3'; bgm.loop = true; bgm.volume = 0.28; bgm.id = 'globalBgm'; document.body.appendChild(bgm); window._bgmAudio = bgm; })();
    function updateBgmButton(){ var bgm = window._bgmAudio; var btn = document.getElementById('globalBgmBtn'); if (!btn) return; if(bgm&&!bgm.paused){ btn.classList.add('playing'); btn.innerHTML='<span class="note-icon">♪</span>'; } else { btn.classList.remove('playing'); btn.innerHTML='♪'; } }
    function toggleGlobalBgm(){ var bgm = window._bgmAudio; if (!bgm) return; if(bgm.paused) bgm.play().catch(function(){}); else bgm.pause(); updateBgmButton(); }
    setInterval(function(){ updateBgmButton(); }, 500);
    document.addEventListener('visibilitychange', function(){ if(document.hidden){ document.querySelectorAll('audio').forEach(function(a){ if(!a.paused){ a.dataset.wasPlaying='true'; a.pause(); } }); } else { document.querySelectorAll('audio').forEach(function(a){ if(a.dataset.wasPlaying==='true'){ a.play().catch(function(){}); delete a.dataset.wasPlaying; } }); } });

    let currentQuestionIdx=0, cnScore=0, jpScore=0;

    function renderCurrentQuestion() {
      const container = document.getElementById('questionContainer');
      const q = questions[currentQuestionIdx];
      container.classList.remove('missing-highlight');
      const savedAnswer = app.answers[q.id];
      container.innerHTML = `
        <div class="question-meta"><span class="badge">第 ${currentQuestionIdx+1} 题</span></div>
        <div class="question-title">${q.text}</div>
        <div class="options">${q.options.map((opt,i) => {
          const code = String.fromCharCode(65 + i);
          const checked = (savedAnswer && savedAnswer.index === i) ? 'checked' : '';
          return `<label class="option"><input type="radio" name="${q.id}" value="${opt.value}" data-index="${i}" ${checked} /><span class="option-code">${code}</span><span>${opt.label}</span></label>`;
        }).join('')}</div>`;
      document.querySelectorAll('.option input').forEach(input => {
        input.addEventListener('change', (e) => {
          const idx = parseInt(e.target.dataset.index);
          app.answers[e.target.name] = { value: e.target.value, index: idx };
          updateProgress();
        });
      });
      updateNavButtons();
    }

   function updateNavButtons() {
     document.getElementById('prevBtn').disabled = (currentQuestionIdx === 0);
     var currentQ = questions[currentQuestionIdx];
     var answered = app.answers.hasOwnProperty(currentQ.id);
     document.getElementById('nextBtn').disabled = (currentQuestionIdx === questions.length - 1) || !answered;
     updateProgress();
    }

    function goNext() { if(currentQuestionIdx < questions.length-1){ currentQuestionIdx++; renderCurrentQuestion(); } }
    function goPrev() { if(currentQuestionIdx > 0){ currentQuestionIdx--; renderCurrentQuestion(); } }



    function updateProgress() {
      const total = questions.length;
      const done = Object.keys(app.answers).length;
      document.getElementById('progressBar').style.width = `${(done/total)*100}%`;
      document.getElementById('progressText').textContent = `${done} / ${total}`;
      document.getElementById('submitBtn').disabled = (done < total);
      // 同步更新下一题按钮状态
      var currentQ = questions[currentQuestionIdx];
      var answered = app.answers.hasOwnProperty(currentQ.id);
      document.getElementById('nextBtn').disabled = (currentQuestionIdx === questions.length - 1) || !answered;
    }

    }

      const all = Object.entries(characters).filter(([_,c])=>c.mbti===mbti).map(([n])=>n);
      if(!preferLang) return all;
      const filtered = all.filter(n=>characters[n].lang===preferLang);
      return filtered.length>0 ? filtered : all;
    }

    function showSecretQuestion(mbti){
      if(document.querySelector('.secret-overlay')) return;
      const q = secretQuestions[mbti]; if(!q) return resolveAndShowResult(null);
      const overlay = document.createElement('div'); overlay.className='secret-overlay';
      overlay.innerHTML = `<div class="secret-card"><div class="secret-badge">✨ 你已触发隐藏题！</div><div class="question-title">${q.text}</div><div class="options">${q.options.map((opt,i)=>`<label class="option"><input type="radio" name="secret" value="${opt.target}" /><span class="option-code">${String.fromCharCode(65+i)}</span><span>${opt.label}</span></label>`).join('')}</div><button id="secretSubmitBtn" class="btn-primary" disabled>确定</button></div>`;
      document.body.appendChild(overlay);
      overlay.querySelectorAll('input[type="radio"]').forEach(r=>r.addEventListener('change',()=>{ overlay.querySelector('#secretSubmitBtn').disabled=false; }));
      overlay.querySelector('#secretSubmitBtn').addEventListener('click',()=>{
        const selected = overlay.querySelector('input[name="secret"]:checked');
        if(selected){ document.body.removeChild(overlay); resolveAndShowResult(selected.value); }
      });
    }

    function resolveAndShowResult(secretCharacterName){
      if(secretCharacterName && characters[secretCharacterName]){ app.finalCharacter=secretCharacterName; app.secretResolved=true; renderResult(); return; }
      if(app.mbtiResult==='ENTJ'){ showENTJOverlay(); return; }
      const preferLang = cnScore>jpScore?'CN':(jpScore>cnScore?'JP':null);
      const candidates = getCandidates(app.mbtiResult, preferLang);
      if(candidates.length===1){ app.finalCharacter=candidates[0]; app.secretResolved=false; renderResult(); return; }
      let bestMatch=null, bestScore=Infinity;
      const userVector = [app.mbtiScores.E-app.mbtiScores.I, app.mbtiScores.N-app.mbtiScores.S, app.mbtiScores.F-app.mbtiScores.T, app.mbtiScores.P-app.mbtiScores.J];
      candidates.forEach(name=>{
        const c=characters[name]; const charVector=[c.ie-50,c.ns-50,c.ft-50,c.pj-50]; let dist=0;
        for(let i=0;i<4;i++) dist+=Math.pow(userVector[i]-charVector[i],2);
        dist=Math.sqrt(dist); dist-=c.weight*1.5;
        if(dist<bestScore){ bestScore=dist; bestMatch=name; }
      });
      app.finalCharacter=bestMatch||candidates[0]; app.secretResolved=false; renderResult();
    }

    function showENTJOverlay(){
      const overlay=document.createElement('div'); overlay.className='secret-overlay';
      overlay.innerHTML = `<div class="secret-card" style="text-align:center;"><div class="secret-badge">🔓 你解锁了终极隐藏！</div><div style="font-size:16px; line-height:1.8; color:#0d6362; margin-bottom:16px;">你的 MBTI 推测为 <b>ENTJ</b> —— 天生的指挥官、战略家。<br>暂无歌姬与你完全共鸣，但你有一位最接近的灵魂之翼。</div><button id="entjRevealBtn" class="btn-primary" style="width:100%;">👇 查看相近共鸣歌姬</button></div>`;
      document.body.appendChild(overlay);
      document.getElementById('entjRevealBtn').addEventListener('click',()=>{
        document.body.removeChild(overlay); app.finalCharacter=(cnScore>=jpScore)?'乐正龙牙':'MEIKO'; app.secretResolved=true; renderResult();
      });
    }

          <div class="section-title">灵魂解读</div><div class="result-desc">${char.desc}</div>
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;"><div class="result-bgm-title" style="margin-bottom:0;">推荐歌单</div><button id="musicToggleBtn" style="border:1px solid #81dfdd; border-radius:50%; width:32px; height:32px; background:#fff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;">🔊</button></div>
          <div class="now-playing" id="nowPlaying" style="display:none;"><span class="note" style="font-size:16px;">🎵</span> 当前播放：<span id="nowPlayingName"></span></div>
          <div class="result-bgm">${songs.map(function(song){ return '<a class="bgm-tag" href="https://www.bilibili.com/video/'+song.bv+'" target="_blank">'+song.name+'</a>'; }).join('')}</div>
          <div style="color: var(--muted); font-size: 11px; margin-top: 6px;">（↑点击歌曲前往B站观看）</div>

      if(char.music){

      }
      var footer=document.getElementById('resultFooter');
      footer.innerHTML = `
        <div class="footer-section" style="text-align:center;"><a href="https://www.bilibili.com/video/BV1of9hBQEsw" target="_blank" class="footer-link">📺 关注作者 / 反馈问题</a></div>
        <div class="footer-section" style="text-align:center; cursor:pointer;" id="staffTrigger" onmouseenter="this.querySelector('span').style.textDecoration='underline'" onmouseleave="this.querySelector('span').style.textDecoration='none'"><span style="color:var(--accent-strong); font-weight:600; font-size:14px;text-decoration: none;">💖 Staff与测试人员感谢</span></div>
        <div class="footer-section" style="text-align:center;"><span style="color:var(--accent-strong); font-size:13px; font-weight:600;">加入VBTI交流群：747501305</span></div>
        <div class="footer-section" style="text-align:center; margin-top:20px;"><div class="footer-big-text">你是谁？请关注更多V家资讯！</div><div class="banner-container"><a href="https://www.bilibili.com/opus/1197677402486996998" target="_blank"><img src="banner/xlpd-banner.webp" alt="2026夏浪派对"></a><a href="https://space.bilibili.com/156489" target="_blank"><img src="banner/zk-banner.webp" alt="中V周刊"></a><a href="https://www.bilibili.com/blackboard/era/YAZ6jyAs8qVslK0r.html" target="_blank"><img src="banner/shulikou.webp" alt="术力口音乐大赛"></a><a href="https://www.bilibili.com/blackboard/era/cb91Hht7tmJzNKqh.html" target="_blank"><img src="banner/Vsinger.webp" alt="Vsinger创作激励"></a></div></div>`;
      document.getElementById('shareBtn').onclick=function(){
        var shareText='我的灵魂歌姬是「'+app.finalCharacter+'」！'+characters[app.finalCharacter].mbti+'型人格，来看看你的是谁？'; var shareUrl=window.location.href;
        if(navigator.share && /Mobi|Android/i.test(navigator.userAgent)){ navigator.share({title:'VBTI · 测测你的灵魂歌姬',text:shareText,url:shareUrl}).catch(function(){ document.getElementById('sharePanel').classList.add('active'); }); }
        else { document.getElementById('sharePanel').classList.add('active'); }
      };
      document.getElementById('cardBtn').onclick=function(){ generateCard(); };
      document.getElementById('staffTrigger').addEventListener('click',function(){
        var overlay=document.createElement('div'); overlay.className='staff-overlay';
        overlay.innerHTML = `<div class="staff-card" style="position:relative;"><button class="staff-close" onclick="this.parentElement.parentElement.remove()">×</button><h3>💖 Staff与测试人员感谢</h3><table><tr><td>策划&开发：</td><td>Crimson茜（墨白茜兔）</td></tr><tr><td>核心内容协力：</td><td>特瑞嗷</td></tr><tr><td></td><td>周刊虚拟歌手中文曲排行榜（失落的分别，物质的量_mol）</td></tr><tr><td></td><td>诺诺小熊猫</td></tr><tr><td>测试感谢：</td><td>花儿不哭</td></tr><tr><td></td><td>-森久保行野-</td></tr><tr><td></td><td>鬼面P</td></tr><tr><td></td><td>CARDINAL星海</td></tr><tr><td></td><td>Semaa小赛</td></tr><tr><td></td><td>半只金蓝</td></tr><tr><td></td><td>鱼丸君</td></tr><tr><td></td><td>侨汣</td></tr><tr><td></td><td>绿洲计划</td></tr><tr><td></td><td>-朝尘-</td></tr></table></div>`;
        document.body.appendChild(overlay); overlay.addEventListener('click',function(e){ if(e.target===overlay) overlay.remove(); });

      fetch('https://my-vbti-worker.3045163252.workers.dev/api/stats', {
        method: 'POST',

        body: JSON.stringify({
          answers: app.answers,
          character: app.finalCharacter,
          mbti: app.mbtiResult,

      showScreen('result');

    function generateCard(){
        const char = characters[app.finalCharacter]; if(!char) return;
        const imgFileName = CHARACTER_IMAGES[app.finalCharacter].split('/').pop();
        const fullImgPath = 'cardprofile/' + imgFileName;
        const w = 400, ih = 340;
        // ===== 可调参数区 =====
        const marginX = 20;      // 图片左右留白（像素）
        const headerH = 200;     // 顶部标题区高度（控制标题→图片的距离）
        const imgTop = 120;      // 图片距顶部的距离（控制图片上下位置）
        const mbtiGap = 15;      // 图片→MBTI标签间距
        const qrGap = 15;        // 灵魂解读→二维码间距
        const bottomGap = 100;    // 二维码→底部文字间距（改大=文字下移）
        const mbtiAreaH = 80;    // MBTI标签区域高度
        const qrAreaH = 40;      // 二维码区域高度（改小=卡片更短）
        const footerH = 10;      // 底部边距（改小=卡片更短）
        const imgH = 340;        // 图片显示高度
        // ====================

        // 计算文字行高
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.font = '12px sans-serif';
        const maxW = 340;
        const words = char.shortDesc ? char.shortDesc.split('') : char.desc.split('');
        const lines = [];
        let line = '';
        for (const ch of words) {
            const test = line + ch;
            if (tempCtx.measureText(test).width > maxW && line.length > 0) {
                lines.push(line);
                line = ch;
            } else line = test;
        }
        if (line) lines.push(line);
        const shownLines = lines.slice(0, 4);
        const textH = shownLines.length * 18 + 25;

        const totalH = headerH + imgH + mbtiAreaH + textH + qrAreaH + footerH;
        const canvas = document.createElement('canvas');
        const scale = 2;
        canvas.width = w * scale;
        canvas.height = totalH * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);

        // 白色背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, totalH);

        // 顶部文字
        ctx.fillStyle = '#1cbaa8';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('✨ 你的灵魂歌姬已降临', w/2, 50);
        ctx.font = 'bold 38px sans-serif';
        ctx.fillText(app.finalCharacter, w/2, 100);

        // 立绘 (cover裁剪 + 左右留白，不压缩不变形)
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = fullImgPath;
        img.onload = function(){
            // 用目标宽度（减去边距）来计算裁剪参数，确保不压缩
            const drawW = w - marginX * 2;
            const drawH = imgH;
            const scaleRatio = Math.max(drawW / img.width, drawH / img.height);
            const sw = drawW / scaleRatio;
            const sh = drawH / scaleRatio;
            const sx = (img.width - sw) / 2;
            const sy = 0;
            ctx.drawImage(img, sx, sy, sw, sh, marginX, imgTop, drawW, drawH);

            let y = imgTop + imgH + mbtiGap;
            const mbtiText = '歌手MBTI推测：' + char.mbti;
            const tw = ctx.measureText(mbtiText).width + 30;
            ctx.fillStyle = '#e0f5f0';
            ctx.beginPath();
            ctx.arc(w/2 - tw/2 + 15, y, 15, Math.PI, -Math.PI/2);
            ctx.lineTo(w/2 + tw/2 - 15, y - 15);
            ctx.arc(w/2 + tw/2 - 15, y, 15, -Math.PI/2, 0);
            ctx.lineTo(w/2 + tw/2, y + 15);
            ctx.arc(w/2 + tw/2 - 15, y, 15, 0, Math.PI/2);
            ctx.lineTo(w/2 - tw/2 + 15, y + 15);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#1cbaa8';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(mbtiText, w/2, y + 8);

            y += 35;
            ctx.fillStyle = '#0d6362';
            ctx.font = 'bold 15px sans-serif';
            ctx.fillText('灵魂解读', w/2, y);
            y += 25;
            ctx.fillStyle = '#4a6b7a';
            ctx.font = '12px sans-serif';
            for (const l of shownLines) {
                ctx.fillText(l, w/2, y);
                y += 18;
            }

            y += qrGap;
            const qrDiv = document.createElement('div');
            new QRCode(qrDiv, { text:'https://vbti-test.com/', width:70, height:70 });
            setTimeout(function(){
                const qrImg = qrDiv.querySelector('canvas') || qrDiv.querySelector('img');
                ctx.drawImage(qrImg, w/2 - 40, y, 80, 80);
                ctx.fillStyle = '#1cbaa8';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('←扫码测测', w/2 + 50, y + 30);
                ctx.fillStyle = '#4a6b7a';
                ctx.font = '11px sans-serif';
                ctx.fillText('你的灵魂歌姬是谁？', w/2 + 50, y + 50);
                ctx.textAlign = 'center';
                y += bottomGap;
                ctx.fillStyle = '#aaa';
                ctx.font = '10px sans-serif';
                ctx.fillText('VBTI · 测测你的灵魂歌姬 | 分享给更多朋友', w/2, y);

                // ===== 圆角裁剪 =====
                // 先把画布内容保存，再用圆角矩形裁切
                const roundedCanvas = document.createElement('canvas');
                roundedCanvas.width = canvas.width;
                roundedCanvas.height = canvas.height;
                const rctx = roundedCanvas.getContext('2d');
                const radius = 24; // 圆角半径（改大=更圆）
                // 绘制圆角矩形路径
                rctx.beginPath();
                rctx.moveTo(radius, 0);
                rctx.lineTo(w * scale - radius, 0);
                rctx.arcTo(w * scale, 0, w * scale, radius, radius);
                rctx.lineTo(w * scale, totalH * scale - radius);
                rctx.arcTo(w * scale, totalH * scale, w * scale - radius, totalH * scale, radius);
                rctx.lineTo(radius, totalH * scale);
                rctx.arcTo(0, totalH * scale, 0, totalH * scale - radius, radius);
                rctx.lineTo(0, radius);
                rctx.arcTo(0, 0, radius, 0, radius);
                rctx.closePath();
                rctx.clip();
                rctx.drawImage(canvas, 0, 0);
                // ==================

                const dataURL = roundedCanvas.toDataURL();
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(13,99,98,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3000;';
                const previewImg = document.createElement('img');
                previewImg.src = dataURL;
                previewImg.style.cssText = 'max-width:90vw;max-height:70vh;object-fit:contain;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.5);';
                previewImg.style.borderRadius = '16px';
                previewImg.style.boxShadow = '0 20px 60px rgba(0,0,0,0.5)';
                const btnRow = document.createElement('div');
                btnRow.style.cssText = 'display:flex;gap:16px;margin-top:20px;';
                const saveBtn = document.createElement('button');
                saveBtn.textContent = '💾 保存到本地';
                saveBtn.style.cssText = 'padding:12px 24px;background:#1cbaa8;color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;';
                saveBtn.onclick = function(){
                    const link = document.createElement('a');
                    link.download = 'VBTI_' + app.finalCharacter + '.png';
                    link.href = dataURL;
                    link.click();
                };
                const closeBtn = document.createElement('button');
                closeBtn.textContent = '✕ 关闭';
                closeBtn.style.cssText = 'padding:12px 24px;background:#fff;color:#1cbaa8;border:1px solid #1cbaa8;border-radius:12px;font-weight:700;cursor:pointer;';
                closeBtn.onclick = function(){ document.body.removeChild(overlay); };
                btnRow.appendChild(saveBtn);
                btnRow.appendChild(closeBtn);
                overlay.appendChild(previewImg);
                overlay.appendChild(btnRow);
                overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
                document.body.appendChild(overlay);
            }, 500);
        };
        img.onerror = function(){ alert('卡片图片加载失败，请检查 cardprofile 文件夹。'); };
    }    

    document.getElementById('startBtn').addEventListener('click',()=>{
      if(window._bgmAudio&&window._bgmAudio.paused){ window._bgmAudio.play().catch(()=>{}); updateBgmButton(); }
      app.answers={}; app.mbtiScores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}; app.mbtiResult=null; app.finalCharacter=null; app.secretResolved=false;
      currentQuestionIdx=0; stopMusic(); renderCurrentQuestion(); showScreen('test');
    });
    document.getElementById('backIntroTestBtn').addEventListener('click',()=>{ if(confirm('确定要返回首页吗？你的进度将会丢失。')) showScreen('intro'); });
    document.getElementById('submitBtn').addEventListener('click',(e)=>{
      if(e.target.disabled) return; e.target.disabled=true;
      var missing=findFirstMissing();
      if(missing!==-1){ currentQuestionIdx=missing; renderCurrentQuestion(); var container=document.getElementById('questionContainer'); container.classList.add('missing-highlight'); window.scrollTo({top:container.offsetTop-100,behavior:'smooth'}); setTimeout(function(){ container.classList.remove('missing-highlight'); },2500); e.target.disabled=false; return; }
      computeMBTI(); const candidates=getCandidates(app.mbtiResult,null);
      if(candidates.length>1 && secretQuestions[app.mbtiResult]){ showSecretQuestion(app.mbtiResult); } else { resolveAndShowResult(null); }
    });
    document.getElementById('prevBtn').addEventListener('click',goPrev);
    document.getElementById('nextBtn').addEventListener('click',goNext);
    document.getElementById('restartBtn').addEventListener('click',()=>{
      if(!confirm('确定要重新测试吗？当前结果将丢失。')) return;
      app.answers={}; app.mbtiScores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}; app.mbtiResult=null; app.finalCharacter=null; app.secretResolved=false;
      currentQuestionIdx=0; stopMusic(); var bgmBtn=document.getElementById('globalBgmBtn'); if(bgmBtn) bgmBtn.style.display='flex';
      if(window._bgmAudio){ window._bgmAudio.play().catch(function(){}); }
      renderCurrentQuestion(); showScreen('test');
    });
    document.getElementById('toTopBtn').addEventListener('click',()=>{
      if(!confirm('确定回到首页吗？')) return;
      stopMusic(); var bgmBtn=document.getElementById('globalBgmBtn'); if(bgmBtn) bgmBtn.style.display='flex';
      if(window._bgmAudio){ window._bgmAudio.currentTime=0; window._bgmAudio.play().catch(function(){}); }
      showScreen('intro');
    });
    document.getElementById('closeSharePanel').addEventListener('click',()=>{ document.getElementById('sharePanel').classList.remove('active'); });
    document.querySelectorAll('.share-item').forEach(item=>{
      item.addEventListener('click',function(){
        var platform=this.dataset.platform, url=window.location.href;
        var text='我的灵魂歌姬是「'+app.finalCharacter+'」！'+characters[app.finalCharacter].mbti+'型人格，来看看你的是谁？', fullText=text+' '+url;
        if(platform==='qq'){ navigator.clipboard.writeText(fullText); alert('文案已复制，打开QQ粘贴分享吧～'); }
        else if(platform==='wechat'){ navigator.clipboard.writeText(fullText); alert('文案已复制，打开微信粘贴分享吧～'); }
        else if(platform==='bilibili'){ navigator.clipboard.writeText(fullText); alert('文案已复制，打开B站动态粘贴分享吧～'); }
        else if(platform==='rednote'){ navigator.clipboard.writeText(fullText); alert('文案已复制，打开小红书粘贴分享吧～'); }
        else if(platform==='copy'){ navigator.clipboard.writeText(url); alert('链接已复制！'); }
        document.getElementById('sharePanel').classList.remove('active');
      });
    });
    var bgmBtn = document.createElement('div'); bgmBtn.className='bgm-control'; bgmBtn.id='globalBgmBtn'; bgmBtn.innerHTML='♪';
    bgmBtn.addEventListener('click', toggleGlobalBgm); document.body.appendChild(bgmBtn); updateBgmButton();
    
</script>
